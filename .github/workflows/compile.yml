name: Compile Tweak

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential rsync libssl-dev clang microhttpd libxml2-dev

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Setup iOS Toolchain and SDK
      run: |
        mkdir -p $HOME/theos/toolchain/linux/iphone
        curl -LO https://github.com
        tar -xf iphone-goolsw-14.2.tar.lzma -C $HOME/theos/toolchain/linux/iphone
        rm iphone-goolsw-14.2.tar.lzma
      
        git clone https://github.com $HOME/theos/sdks

    - name: Compile Package
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DriveX-Debian-Package
        path: packages/*.deb
